<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GACE - Registro de Capacitación</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --azul-gace: #1565C0; --amarillo-gace: #ffd700; --gris-suave: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--gris-suave); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--azul-gace); text-align: center; border-bottom: 2px solid var(--azul-gace); padding-bottom: 10px; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .temario-box { background: #fffde7; padding: 15px; border-left: 5px solid var(--amarillo-gace); margin: 15px 0; font-size: 0.95em; line-height: 1.4; }
        canvas { border: 1px dashed #666; background: #fff; width: 100%; height: 120px; border-radius: 5px; cursor: crosshair; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th { background-color: var(--amarillo-gace); color: black; padding: 12px; text-transform: uppercase; font-size: 0.85em; }
        td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-pdf { background: #2e7d32; color: white; margin-top: 20px; font-size: 1.1em; }
        .btn-pdf:hover { background: #1b5e20; }
        .btn-qr { background: var(--azul-gace); color: white; }
        .btn-clear { background: #d32f2f; color: white; width: auto; padding: 5px 10px; font-size: 0.8em; }
        #qr-container { display: none; text-align: center; padding: 20px; border: 2px solid var(--azul-gace); border-radius: 10px; background: #e3f2fd; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>GRUPO ÁGUILAS - GACE</h2>
        <p style="text-align:center; margin-top:-10px;">Registro de Capacitación de Personal</p>

        <div id="qr-container">
            <span class="material-icons" style="font-size: 40px; color: var(--azul-gace);">qr_code_2</span>
            <p><strong>PREREGISTRO ACTIVO</strong><br>Los participantes pueden escanear para firmar:</p>
            <div id="qrcode"></div>
            <button class="btn btn-clear" style="margin: 10px auto;" onclick="toggleQR()">CERRAR QR</button>
        </div>

        <div class="grid-form">
            <div>
                <label>Planta:</label>
                <input type="text" id="planta" placeholder="Ej. Align 2" value="Align 2">
            </div>
            <div>
                <label>Turno:</label>
                <select id="turno">
                    <option value="1er Turno">1er Turno</option>
                    <option value="2do Turno">2do Turno</option>
                    <option value="3er Turno">3er Turno</option>
                </select>
            </div>
            <div>
                <label>Fecha:</label>
                <input type="date" id="fecha">
            </div>
        </div>

        <div class="grid-form">
            <div style="grid-column: span 2;">
                <label>Curso:</label>
                <input type="text" id="cursoNombre" value="Entrega y recepción de mensajería y paquetería">
            </div>
            <div>
                <label>Duración:</label>
                <input type="text" id="duracion" value="2 horas">
            </div>
        </div>

        <div>
            <label>Instructor:</label>
            <input type="text" id="instructor" placeholder="Nombre completo">
        </div>

        <div class="temario-box">
            <strong>Contenido:</strong><br>
            <textarea id="contenido" rows="3" style="border:none; background:transparent; resize:none;">Criterios C-TPAT, ¿Qué es una paquetería?, ¿Cómo identificar una paquetería sospechosa?, ¿Qué hacer si recibes una correspondencia sospechosa? y recomendaciones al recibir paquetería.</textarea>
        </div>

        <label>Firma del Instructor:</label>
        <canvas id="pad-instructor"></canvas>
        <button class="btn btn-clear" onclick="limpiarCanvas()">Limpiar Firma</button>
    </div>

    <div class="card">
        <h3>Lista de Asistencia (<span id="contador">0</span>)</h3>
        <button class="btn btn-qr" onclick="toggleQR()">
            <span class="material-icons">qr_code</span> MOSTRAR CÓDIGO QR PARA REGISTRO
        </button>

        <table id="tablaAsistencia">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Nombre</th>
                    <th>No. De Orden</th>
                    <th>Puesto</th>
                    <th>Firma</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>

        <button class="btn btn-pdf" onclick="generarPDF()">
            <span class="material-icons">picture_as_pdf</span> FINALIZAR Y GENERAR PDF FINAL
        </button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let firmasLocales = [];
    // REEMPLAZA ESTA URL CON TU ID DE DESPLIEGUE DE APPS SCRIPT
    const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT_AQUI";

    function init() {
        document.getElementById('fecha').valueAsDate = new Date();
        setupCanvas();
        // Revisar firmas nuevas cada 5 segundos
        setInterval(obtenerFirmasNube, 5000);
    }

    function setupCanvas() {
        const canvas = document.getElementById('pad-instructor');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        let drawing = false;

        const start = (e) => { drawing = true; ctx.beginPath(); move(e); };
        const end = () => drawing = false;
        const move = (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
        };

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        ctx.lineWidth = 2;
    }

    async function obtenerFirmasNube() {
        try {
            const resp = await fetch(`${SCRIPT_URL}?op=readSignatures`);
            const data = await resp.json();
            if (data.length !== firmasLocales.length) {
                firmasLocales = data;
                actualizarTabla();
            }
        } catch (e) { console.log("Esperando conexión..."); }
    }

    function actualizarTabla() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = firmasLocales.map((f, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${f.nombre}</td>
                <td>${f.orden}</td>
                <td>${f.puesto}</td>
                <td><img src="${f.firma}" height="30"></td>
            </tr>
        `).join('');
        document.getElementById('contador').innerText = firmasLocales.length;
    }

    function generarPDF() {
        if (firmasLocales.length === 0) return alert("No hay participantes registrados.");
        
        const doc = new jsPDF();
        const planta = document.getElementById('planta').value;
        const turno = document.getElementById('turno').value;
        const fecha = document.getElementById('fecha').value;

        // --- ENCABEZADO ---
        doc.setFont("helvetica", "bold");
        doc.setFontSize(16);
        doc.text("GRUPO ÁGUILAS - GACE", 105, 20, { align: "center" });
        doc.setFontSize(10);
        doc.text("Registro de Capacitación de Personal", 105, 26, { align: "center" });

        // --- DATOS SESIÓN ---
        doc.setFontSize(10);
        doc.text(`Planta: ${planta}`, 15, 40);
        doc.text(`Curso: ${document.getElementById('cursoNombre').value}`, 100, 40);
        doc.text(`Instructor: ${document.getElementById('instructor').value}`, 15, 50);
        doc.text(`Duración: ${document.getElementById('duracion').value}`, 100, 50);
        doc.text(`Fecha: ${fecha}`, 165, 50);

        doc.text("Contenido:", 15, 60);
        doc.setFont("helvetica", "normal");
        const contSplit = doc.splitTextToSize(document.getElementById('contenido').value, 160);
        doc.text(contSplit, 35, 60);

        doc.setFontSize(8);
        const aviso = "El personal de seguridad de Grupo Águilas aceptamos que fuimos capacitados y adiestrados por el equipo GACE de Grupo Águilas...";
        doc.text(doc.splitTextToSize(aviso, 180), 15, 75);

        // --- TABLA DE ASISTENCIA ---
        doc.autoTable({
            startY: 85,
            head: [['No.', 'Nombre', 'No. De Orden', 'Puesto', 'Firma']],
            body: firmasLocales.map((f, i) => [i+1, f.nombre, f.orden, f.puesto, '']),
            headStyles: { fillColor: [255, 215, 0], textColor: [0, 0, 0] },
            didDrawCell: (data) => {
                if (data.column.index === 4 && data.cell.section === 'body') {
                    doc.addImage(firmasLocales[data.row.index].firma, 'PNG', data.cell.x + 2, data.cell.y + 1, 15, 6);
                }
            }
        });

        // --- FIRMA INSTRUCTOR ---
        const finalY = doc.lastAutoTable.finalY + 35;
        const imgInstructor = document.getElementById('pad-instructor').toDataURL();
        doc.addImage(imgInstructor, 'PNG', 80, finalY - 20, 50, 15);
        doc.line(70, finalY, 140, finalY);
        doc.text("Firma del instructor", 105, finalY + 5, { align: "center" });

        // GUARDAR PDF
        const nombreArchivo = `ROSTER_${planta.replace(/ /g, "_")}_${turno.replace(/ /g, "_")}_${fecha}.pdf`;
        doc.save(nombreArchivo);

        // --- LIMPIEZA POST-GENERACIÓN ---
        if(confirm("¿Deseas limpiar la lista para un nuevo curso?")) {
            fetch(`${SCRIPT_URL}?op=clearAll`).then(() => {
                alert("Registros borrados. La página se reiniciará.");
                location.reload();
            });
        }
    }

    function toggleQR() {
        const div = document.getElementById('qr-container');
        if (div.style.display === 'block') {
            div.style.display = 'none';
        } else {
            const urlRegistro = window.location.href + "?modo=registro";
            document.getElementById('qrcode').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(urlRegistro)}">`;
            div.style.display = 'block';
        }
    }

    function limpiarCanvas() {
        const canvas = document.getElementById('pad-instructor');
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }

    window.onload = init;
</script>
</body>
</html>
